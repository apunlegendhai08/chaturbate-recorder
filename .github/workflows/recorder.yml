name: 24/7 Recorder

on:
  workflow_dispatch:
    inputs:
      duration_hours:
        description: "Recording duration in hours (1-4). Max 4: setup (~20 min) + recording + uploads (~40 min) must stay under the 6-hour GitHub Actions limit."
        required: false
        default: "4"

concurrency:
  group: recorder
  cancel-in-progress: false

permissions:
  actions: write
  contents: write

env:
  APP_URL: http://localhost:8080
  COMPOSE_PROJECT_NAME: recorder
  INSTANCE_ID: ${{ secrets.INSTANCE_ID || github.repository_id }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
  VOESX_API_KEY: ${{ secrets.VOESX_API_KEY }}
  SENDCM_API_KEY: ${{ secrets.SENDCM_API_KEY }}
  GOFILE_API_KEY: ${{ secrets.GOFILE_API_KEY }}
  BYSE_API_KEY: ${{ secrets.BYSE_API_KEY }}
  PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
  PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
  PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
  DELETE_LOCAL_AFTER_UPLOAD: "true"
  WORKFLOW_FILE: .github/workflows/recorder.yml

jobs:
  record:
    name: Record and upload
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Prepare workspace
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p videos database emergency-backup

          # .env is required by docker-compose.yml but not in git (secrets)
          # Secrets are passed via job-level env vars; .env just needs to exist
          touch .env

          # Install jq for JSON parsing
          sudo apt-get update -qq && sudo apt-get install -y -qq jq

          echo "Workspace: $GITHUB_WORKSPACE"

          # Disk space pre-flight — need ~10 GB headroom for recordings + backup.
          AVAIL_GB=$(df --output=avail / | tail -1 | awk '{print int($1/1048576)}')
          echo "Disk space: ${AVAIL_GB} GB available"
          if (( AVAIL_GB < 8 )); then
            echo "ERROR: Only ${AVAIL_GB} GB free — need at least 8 GB for recordings + backup."
            exit 1
          fi

      - name: Clear stale tunnel URL
        if: always()
        shell: bash
        run: |
          # Clear any leftover tunnel URL from a previous cancelled run so the
          # Go app doesn't advertise a dead tunnel.
          if [[ -n "${SUPABASE_URL:-}" && -n "${SUPABASE_API_KEY:-}" ]]; then
            curl -sS -X PATCH "${SUPABASE_URL}/rest/v1/app_settings?key=eq.tunnel_url" \
              -H "apikey: ${SUPABASE_API_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_API_KEY}" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=minimal" \
              -d '{"value": ""}' >/dev/null 2>&1 || true
            echo "Cleared stale tunnel URL from app_settings."
          fi

      - name: Check for existing runs (self-queue guard)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Small random delay to reduce race when two runs start simultaneously.
          sleep $(( RANDOM % 10 + 1 ))
          # Re-check after delay — reduces TOCTOU window for near-simultaneous starts.
          existing="$(
            gh run list \
              --workflow "${WORKFLOW_FILE}" \
              --limit 20 \
              --json databaseId,status \
              --jq "[.[] | select(.databaseId != ${GITHUB_RUN_ID} and (.status == \"queued\" or .status == \"in_progress\"))] | length"
          )"
          if (( existing > 0 )); then
            echo "Another recorder run is already queued or running (${existing} found) — cancelling this one."
            # Clear stale tunnel URL before cancelling so the Go app doesn't
            # advertise a dead tunnel on the brief overlap before cancellation.
            if [[ -n "${SUPABASE_URL:-}" && -n "${SUPABASE_API_KEY:-}" ]]; then
              curl -sS -X PATCH "${SUPABASE_URL}/rest/v1/app_settings?key=eq.tunnel_url" \
                -H "apikey: ${SUPABASE_API_KEY}" \
                -H "Authorization: Bearer ${SUPABASE_API_KEY}" \
                -H "Content-Type: application/json" \
                -H "Prefer: return=minimal" \
                -d '{"value": ""}' >/dev/null 2>&1 || true
            fi
            gh run cancel "${GITHUB_RUN_ID}" --repo "$GITHUB_REPOSITORY" || true
            sleep 3
            echo "Cancellation requested — failing step to stop subsequent work."
            exit 1
          fi
          echo "No other runs active — proceeding."

      - name: Validate configuration
        id: config
        shell: bash
        run: |
          set -euo pipefail

          duration="${{ inputs.duration_hours || '4' }}"
          if ! [[ "$duration" =~ ^[0-9]+$ ]]; then
            echo "duration_hours must be a whole number."
            exit 1
          fi

          # Max 4 h: setup (~20 min) + recording + stop/uploads (~40 min) must
          # fit inside the 6-hour GitHub Actions job timeout (360 min).
          # duration=5 leaves only ~20 min total for setup+uploads — not enough.
          if (( duration < 1 || duration > 4 )); then
            echo "duration_hours must be between 1 and 4 on GitHub-hosted runners (5 h exceeds the 6 h job limit when setup+upload time is included)."
            exit 1
          fi

          if [[ -z "${SUPABASE_URL}" || -z "${SUPABASE_API_KEY}" ]]; then
            echo "SUPABASE_URL and SUPABASE_API_KEY secrets are required."
            exit 1
          fi

          echo "DURATION_HOURS=$duration" >> "$GITHUB_ENV"
          echo "duration=$duration" >> "$GITHUB_OUTPUT"
          echo "valid=true" >> "$GITHUB_OUTPUT"

      - name: Ensure Supabase app_settings table
        shell: bash
        run: |
          set -euo pipefail

          # The app_settings table is required by the Go code (stored via REST API).
          # We check if it's accessible and warn if not.
          HTTP_CODE=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 10 \
            "${SUPABASE_URL}/rest/v1/app_settings?key=eq.__healthcheck__&select=key&limit=1" \
            -H "apikey: ${SUPABASE_API_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_API_KEY}" 2>/dev/null || echo "000")

          case "$HTTP_CODE" in
            200) echo "app_settings table is accessible via REST API." ;;
            404) echo "WARNING: app_settings table not found (HTTP 404)."
                 echo "Run supabase/migrations/000_complete_setup_all_tables.sql in your Supabase SQL editor." ;;
            401|403) echo "WARNING: authentication failed (HTTP $HTTP_CODE). Check SUPABASE_API_KEY." ;;
            *)   echo "WARNING: unexpected response (HTTP $HTTP_CODE)." ;;
          esac

      - name: Build and start chaturbate-dvr
        shell: bash
        run: |
          set -euo pipefail
          echo "Starting chaturbate-dvr..."
          docker compose up -d --build chaturbate-dvr

          echo "=== Full container status ==="
          docker compose ps -a

      - name: Wait for web UI
        shell: bash
        run: |
          set -euo pipefail

          echo "Waiting for recorder web UI..."
          RESTART_COUNT=0
          for attempt in {1..60}; do
            if curl -fsS --max-time 5 "$APP_URL" >/dev/null 2>/dev/null; then
              echo "Web UI is ready"
              exit 0
            fi

            # Check if container is in a restart loop
            CH_COUNT="$(docker inspect --format '{{.RestartCount}}' chaturbate-dvr 2>/dev/null || echo '0')"
            if [[ "$CH_COUNT" != "0" && "$CH_COUNT" != "$RESTART_COUNT" ]]; then
              RESTART_COUNT="$CH_COUNT"
              echo "  chaturbate-dvr restart #${CH_COUNT} — recent logs:"
              docker compose logs --tail=20 chaturbate-dvr 2>/dev/null || true
            fi

            if (( attempt % 10 == 0 )); then
              elapsed=$(( attempt * 2 ))
              echo "  [${elapsed}s] still waiting — checking container state..."
              docker compose ps chaturbate-dvr --format json 2>/dev/null | head -3 || true
            fi

            sleep 2
          done

          echo "Web UI did not become ready in time"
          echo "=== Container status ==="
          docker compose ps
          echo "=== Port mappings ==="
          docker port chaturbate-dvr 2>/dev/null || echo "  (no port info)"
          echo "=== Recent logs ==="
          docker compose logs --tail=100 chaturbate-dvr
          exit 1

      - name: Install cloudflared
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL -o cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          cloudflared --version

      - name: Start Cloudflare tunnel
        id: tunnel
        shell: bash
        run: |
          set -euo pipefail

          # Clean stale cloudflared state that can cause JSON parse errors
          rm -rf ~/.cloudflared

          tunnel_url=""

          # ── Attempt 1: cloudflared quick tunnel ──────────────────────────
          for retry in {1..3}; do
            echo "cloudflared attempt $retry/3..."
            rm -f tunnel.log tunnel.pid
            cloudflared tunnel --url "$APP_URL" --no-autoupdate > tunnel.log 2>&1 &
            echo "$!" > tunnel.pid

            for attempt in {1..24}; do
              tunnel_url="$(grep -oE 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' tunnel.log 2>/dev/null | head -n 1 || true)"
              if [[ -n "$tunnel_url" ]]; then
                break 2
              fi
              sleep 5
            done

            kill "$(cat tunnel.pid)" 2>/dev/null || true
            wait "$(cat tunnel.pid)" 2>/dev/null || true
            sleep 3
          done

          # ── Attempt 2: localhost.run fallback ────────────────────────────
          if [[ -z "$tunnel_url" ]]; then
            echo "cloudflared failed — trying localhost.run..."
            rm -f tunnel.log tunnel.pid
            # ExitOnForwardFailure: fail immediately if remote port binding fails
            # ServerAliveCountMax=120: keep the tunnel alive for ~1 hour of silence
            # BatchMode=yes: prevent hanging on password prompt if key auth fails
            ssh -o StrictHostKeyChecking=no \
                -o ServerAliveInterval=30 \
                -o ServerAliveCountMax=120 \
                -o ExitOnForwardFailure=yes \
                -o BatchMode=yes \
                -R 80:localhost:8080 nokey@localhost.run > tunnel.log 2>&1 &
            echo "$!" > tunnel.pid

            for attempt in {1..24}; do
              tunnel_url="$(grep -oE 'https://[a-zA-Z0-9.-]+\.lhr\.life' tunnel.log 2>/dev/null | head -n 1 || true)"
              if [[ -n "$tunnel_url" ]]; then
                echo "Tunnel via localhost.run: $tunnel_url"
                break
              fi
              sleep 5
            done
          fi

          if [[ -z "$tunnel_url" ]]; then
            echo "No tunnel could be created — recording still works locally."
            echo "TUNNEL_URL=" >> "$GITHUB_ENV"
            exit 0
          fi

          # (tunnel URL is stored in Supabase; no local file needed)
          echo "TUNNEL_URL=$tunnel_url" >> "$GITHUB_ENV"
          echo "url=$tunnel_url" >> "$GITHUB_OUTPUT"

          # Verify tunnel is reachable
          status=""
          for attempt in {1..12}; do
            status="$(curl -sS -o /dev/null -w '%{http_code}' --connect-timeout 10 --max-time 15 "$tunnel_url" 2>/dev/null || echo "000")"
            if [[ "$status" == "200" ]]; then
              echo "Tunnel is reachable"
              break
            fi
            echo "  Tunnel verification attempt $attempt: HTTP $status"
            sleep 5
          done

          if [[ "$status" != "200" ]]; then
            echo "WARNING: Tunnel URL not verified as reachable (last status: $status) — recording still works locally"
          fi

          # Save tunnel URL to Supabase
          curl -fsS -X POST "${SUPABASE_URL}/rest/v1/tunnel_sessions" \
            -H "apikey: ${SUPABASE_API_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_API_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"run_id\": ${GITHUB_RUN_NUMBER}, \"instance_id\": \"${INSTANCE_ID}\", \"url\": \"${tunnel_url}\", \"started_at\": \"$(date -u +%FT%TZ)\", \"is_active\": true}" \
            2>/dev/null || echo "Could not save tunnel URL to Supabase tunnel_sessions table."

          # Also persist to the app_settings table (read by the Go code at runtime).
          # Use PATCH first (updates existing row by key). If no row exists
          # (HTTP 404 or 0 rows matched), fall back to POST to insert new row.
          # This avoids relying on unique constraints for merge-duplicates.
          HTTP_CODE=$(curl -sS -o /dev/null -w '%{http_code}' -X PATCH \
            "${SUPABASE_URL}/rest/v1/app_settings?key=eq.tunnel_url" \
            -H "apikey: ${SUPABASE_API_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_API_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"value\": \"${tunnel_url}\"}" \
            2>/dev/null || echo "000")
          if [[ "$HTTP_CODE" != "200" && "$HTTP_CODE" != "204" ]]; then
            curl -fsS -X POST "${SUPABASE_URL}/rest/v1/app_settings" \
              -H "apikey: ${SUPABASE_API_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_API_KEY}" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=minimal" \
              -d "{\"key\": \"tunnel_url\", \"value\": \"${tunnel_url}\"}" \
              2>/dev/null || true
          fi

      - name: Publish run summary
        if: always()
        shell: bash
        run: |
          {
            echo "# Recorder run"
            echo
            echo "- Run: ${GITHUB_RUN_NUMBER}"
            echo "- Duration: ${DURATION_HOURS:-unknown} hour(s)"
            echo "- Started: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            if [[ -n "${TUNNEL_URL:-}" ]]; then
              echo "- Web UI: ${TUNNEL_URL}"
            else
              echo "- Web UI: tunnel was not created"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Keep recorder running
        shell: bash
        run: |
          set -euo pipefail
          # Guard: DURATION_HOURS must be a positive integer. The validate step
          # exports it, but a defensive check here prevents a silent 0-hour run
          # if the env var was somehow lost between steps.
          if [[ -z "${DURATION_HOURS:-}" ]] || ! [[ "${DURATION_HOURS}" =~ ^[1-9][0-9]*$ ]]; then
            echo "ERROR: DURATION_HOURS is '${DURATION_HOURS:-unset}' — must be a positive integer. Check the 'Validate configuration' step output."
            exit 1
          fi

          finish_at="$(( $(date +%s) + DURATION_HOURS * 3600 ))"
          echo "Recording for ${DURATION_HOURS} hour(s) — finishing at $(date -d @${finish_at} '+%H:%M:%S UTC')"

          # Guard variable: stop_recorder must only run once. Set by the trap
          # or by natural timeout; checked to prevent double-invocation.
          STOPPED=0
          # Set to 1 by the SIGTERM/SIGINT trap so stop_recorder knows the job
          # was externally cancelled (shorter shutdown window vs. natural expiry).
          CANCEL_SIGNAL=0
          # Counter for consecutive crash-restart cycles.
          restart_count=0
          MAX_RESTARTS=10
          # Loop iteration counter for periodic health logging.
          loop_iter=0

          stop_recorder() {
            # Idempotency guard — prevents double-invocation (trap + natural timeout).
            if (( STOPPED )); then return; fi
            STOPPED=1

            # Videos live on the host via bind mount (./videos), so no need to
            # docker compose cp — the files are already outside the container.
            # Log current state for debugging.
            echo "Current videos on host: $(find ./videos -maxdepth 2 -type f 2>/dev/null | wc -l) files ($(du -sh ./videos 2>/dev/null | cut -f1))"

            # Check if recordings are still active — warn if so.
            if curl -fsS --max-time 5 "$APP_URL" >/dev/null 2>/dev/null; then
              active=$(curl -sS --max-time 5 "$APP_URL" 2>/dev/null | grep -c 'channel-info' || true)
              if (( active > 0 )); then
                echo "WARNING: ${active} channel(s) still recording — they will be finalized during graceful shutdown."
              fi
            fi

            # When called from the SIGTERM/SIGINT trap (job cancelled), GitHub
            # Actions will kill the runner process within ~30 s of the signal.
            # Use a 25 s timeout so docker compose stop has a chance to deliver
            # SIGTERM to the container before the runner dies; the container then
            # continues its own graceful shutdown under the stop_grace_period.
            # For a natural timer expiry (no cancel signal), use the full 3000 s
            # (50 min) window so large uploads can complete before SIGKILL.
            if (( CANCEL_SIGNAL )); then
              echo "=== Run cancelled — sending SIGTERM to container (25 s window before runner dies) ==="
              docker compose stop -t 25 chaturbate-dvr || true
            else
              echo "=== Recording window ended — stopping recorder gracefully (up to 50 min for uploads) ==="
              docker compose stop -t 3000 chaturbate-dvr || true
            fi

            # Videos are on the host via bind mount — log final state.
            echo "Final videos on host: $(find ./videos -maxdepth 2 -type f 2>/dev/null | wc -l) files ($(du -sh ./videos 2>/dev/null | cut -f1))"
            echo "=== Recorder stopped ==="
          }

          # Trap fires on SIGTERM/SIGINT (job cancelled by GitHub Actions or user).
          # Record that we were cancelled so stop_recorder uses the short timeout,
          # then stop the recorder, kill any sleeping background process, and break.
          trap 'CANCEL_SIGNAL=1; stop_recorder; kill %% 2>/dev/null; wait 2>/dev/null; break' INT TERM

          # Disable set -e inside the while loop so a single failed command
          # (pipe error, docker hiccup) doesn't kill the script and skip
          # stop_recorder entirely.
          set +e
          while (( $(date +%s) < finish_at )); do
            # Use --filter to only match containers that are actually running.
            # Without --filter, --services lists all defined services regardless
            # of state, so a crashed container would never be detected.
            if ! docker compose ps --filter status=running --services | grep -qx "chaturbate-dvr"; then
              restart_count=$(( restart_count + 1 ))
              echo "chaturbate-dvr is not running (crash #${restart_count}/${MAX_RESTARTS}) — diagnostics:"

              # Capture exit code, OOMKilled flag, and stop time so we know the
              # root cause (OOM kill → increase memory limit; exit 2 → Go panic;
              # exit 137 → SIGKILL from outside; exit 1 → log.Fatal).
              echo "--- docker inspect ---"
              docker inspect chaturbate-dvr \
                --format='ExitCode={{.State.ExitCode}} OOMKilled={{.State.OOMKilled}} Error="{{.State.Error}}" FinishedAt={{.State.FinishedAt}}' \
                2>/dev/null || true

              # Memory and disk state at time of crash.
              echo "--- resource state at crash ---"
              docker stats --no-stream --format "MEM: {{.MemUsage}}  CPU: {{.CPUPerc}}" chaturbate-dvr 2>/dev/null || true
              AVAIL_GB_CRASH=$(df --output=avail / | tail -1 | awk '{print int($1/1048576)}')
              echo "Disk available: ${AVAIL_GB_CRASH} GB"

              echo "--- recent container logs (last 300 lines) ---"
              docker compose logs --tail=300 chaturbate-dvr || true

              if (( restart_count > MAX_RESTARTS )); then
                echo "ERROR: Too many consecutive crashes (${restart_count}) — giving up."
                stop_recorder
                break
              fi

              # Try a simple restart first; only rebuild if the first restart fails.
              docker compose up -d chaturbate-dvr
              sleep 5
              if ! docker compose ps --filter status=running --services | grep -qx "chaturbate-dvr"; then
                echo "Simple restart failed — rebuilding..."
                docker compose up -d --build chaturbate-dvr
              fi

              for attempt in {1..30}; do
                if curl -fsS --max-time 5 "$APP_URL" >/dev/null 2>/dev/null; then
                  echo "chaturbate-dvr restarted successfully."
                  restart_count=0  # Reset counter on successful recovery.
                  break
                fi
                sleep 2
              done
            fi

            loop_iter=$(( loop_iter + 1 ))
            # Log health every 5 min (every 5 iterations at 60s sleep).
            if (( loop_iter % 5 == 0 )); then
              echo "=== health check ($(date -u '+%H:%M UTC')) ==="
              # Memory/CPU snapshot — helps spot OOM trends before a crash occurs.
              docker stats --no-stream \
                --format "MEM: {{.MemUsage}}  CPU: {{.CPUPerc}}  NET: {{.NetIO}}" \
                chaturbate-dvr 2>/dev/null || true
              # 300-line tail captures full crash output if the container just died.
              docker compose logs --tail=300 chaturbate-dvr 2>/dev/null || true
              echo "=== end health check ==="
            fi

            # Check disk space — warn if low (recording will fail when disk is full).
            avail_gb=$(df --output=avail / | tail -1 | awk '{print int($1/1048576)}')
            if (( avail_gb < 2 )); then
              echo "WARNING: Only ${avail_gb} GB disk space remaining — recordings may fail soon!"
            fi

            # Use a background sleep so SIGTERM/SIGINT wakes the trap immediately
            # instead of waiting up to 60 s for the foreground sleep to finish.
            sleep 60 &
            wait $!
          done
          set -e

          # Timer expired naturally — gracefully stop the recorder so it can
          # finalize any active recordings (mux, thumbnail, upload) before the
          # container is torn down.  stop_recorder sends SIGTERM and gives the
          # Go app 300 s to finish.  The Go signal handler now correctly stops
          # all channels first, waits for post-processing, then waits for uploads.
          echo "=== Recording window ended — stopping recorder gracefully ==="
          stop_recorder

      - name: Back up generated files
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          # Videos are on the host via bind mount (./videos) — no need to copy.
          echo "Video files on host:"
          find ./videos -maxdepth 2 -type f -printf '%p\n' 2>/dev/null | head -100 || true
          echo "Total: $(find ./videos -maxdepth 2 -type f 2>/dev/null | wc -l) files ($(du -sh ./videos 2>/dev/null | cut -f1))"

      - name: Upload emergency artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recordings-${{ github.run_number }}
          path: videos/
          # 7 days keeps costs manageable (~1 GB/run × 6 runs/day = ~42 GB peak).
          # Recordings are already uploaded to file hosts; artifact is a safety net only.
          retention-days: 7
          if-no-files-found: ignore

      - name: Queue next run
        if: always() && steps.config.outputs.valid == 'true' && !cancelled()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          # Small random delay to reduce race between two runs checking simultaneously.
          sleep $(( RANDOM % 10 + 1 ))

          queued_or_running="$(
            gh run list \
              --workflow "${WORKFLOW_FILE}" \
              --limit 20 \
              --json databaseId,status \
              --jq "[.[] | select(.databaseId != ${GITHUB_RUN_ID} and (.status == \"queued\" or .status == \"in_progress\"))] | length"
          )"

          if (( queued_or_running > 0 )); then
            echo "Another recorder run is already queued or running."
            exit 0
          fi

          # Cap at 4 h so every self-queued run stays within the 6-hour GH Actions
          # job timeout after accounting for setup (~20 min) and upload (~40 min).
          next_duration="${{ steps.config.outputs.duration }}"
          if (( next_duration > 4 )); then
            next_duration=4
          fi
          gh workflow run "${WORKFLOW_FILE}" --repo "$GITHUB_REPOSITORY" \
            -f duration_hours="${next_duration}"
          echo "Queued the next recorder run (duration: ${next_duration}h)."

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          set +e

          # Mark tunnel as inactive in tunnel_sessions and clear the live URL
          # from app_settings so the Go code stops advertising a dead tunnel.
          if [[ -n "${SUPABASE_URL}" && -n "${SUPABASE_API_KEY}" ]]; then
            if [[ -n "${TUNNEL_URL:-}" ]]; then
              curl -sS -X PATCH "${SUPABASE_URL}/rest/v1/tunnel_sessions?run_id=eq.${GITHUB_RUN_NUMBER}&instance_id=eq.${INSTANCE_ID}" \
                -H "apikey: ${SUPABASE_API_KEY}" \
                -H "Authorization: Bearer ${SUPABASE_API_KEY}" \
                -H "Content-Type: application/json" \
                -H "Prefer: return=minimal" \
                -d "{\"is_active\": false, \"last_seen_at\": \"$(date -u +%FT%TZ)\"}" \
                >/dev/null || true

              # Clear the tunnel URL from app_settings so the Go app does not
              # keep reading a dead URL after the run ends.
              curl -sS -X PATCH "${SUPABASE_URL}/rest/v1/app_settings?key=eq.tunnel_url" \
                -H "apikey: ${SUPABASE_API_KEY}" \
                -H "Authorization: Bearer ${SUPABASE_API_KEY}" \
                -H "Content-Type: application/json" \
                -H "Prefer: return=minimal" \
                -d "{\"value\": \"\"}" \
                >/dev/null || true
            fi
          fi

          # Kill tunnel processes
          if [[ -f tunnel.pid ]]; then
            kill "$(cat tunnel.pid)" 2>/dev/null || true
          fi
          pkill -f cloudflared 2>/dev/null || true

          # Stop containers and clean up
          echo "Stopping services..."
          docker compose down --remove-orphans --volumes 2>/dev/null || true
          docker image prune -f 2>/dev/null || true

          echo "Cleanup complete."
