services:
  # Byparr - Cloudflare bypass service (official image)
  byparr:
    image: ghcr.io/thephaseless/byparr:latest
    container_name: byparr
    environment:
      - HOST=0.0.0.0
      - PORT=8191
      - TIMEOUT=180
      - LOG_LEVEL=INFO
    restart: unless-stopped
    # /health returns 200 as soon as FastAPI and the Playwright browser are
    # ready. /docs triggers an internal wait_for_load_state("networkidle")
    # that always times out during startup — do NOT use it as a readiness probe.
    # Reduced start_period and retries to cut startup time from ~7 min to ~2 min.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8191/health"]
      interval: 30s
      timeout: 35s
      retries: 3
      start_period: 60s
    networks:
      - recorder-network

  # Chaturbate DVR - Stream recorder (built from gogoqaz fork)
  chaturbate-dvr:
    build: .
    container_name: chaturbate-dvr
    command: ["--port", "8080", "--compress=false"]
    env_file:
      - .env
    environment:
      - INSTANCE_ID=${INSTANCE_ID:-}
      - FLARESOLVERR_URL=http://byparr:8191/v1
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_API_KEY=${SUPABASE_API_KEY:-}
      - VOESX_API_KEY=${VOESX_API_KEY:-}
      - SENDCM_API_KEY=${SENDCM_API_KEY:-}
      - BYSE_API_KEY=${BYSE_API_KEY:-}
      - PROXY_URL=${PROXY_URL:-${PROXY_SERVER:-}}
      - PROXY_USERNAME=${PROXY_USERNAME:-}
      - PROXY_PASSWORD=${PROXY_PASSWORD:-}
      - COOKIES=${COOKIES:-}
      - USER_AGENT=${USER_AGENT:-}
      - DELETE_LOCAL_AFTER_UPLOAD=true
    ports:
      - "8080:8080"
    volumes:
      - ./videos:/usr/src/app/videos
      - ./database:/database
    depends_on:
      byparr:
        condition: service_healthy
    restart: unless-stopped
    # Must be >= the -t value passed to `docker compose stop` in stop_recorder (3000s = 50m).
    # A shorter value here would cause Docker to SIGKILL the container before uploads finish.
    stop_grace_period: 55m
    networks:
      - recorder-network
    deploy:
      resources:
        limits:
          # Increased from 1G: muxing large A/V sidecars + concurrent uploads can easily
          # exceed 1G, triggering an OOM kill with no graceful shutdown.
          memory: 3G
        reservations:
          cpus: '0.2'
          memory: 200M

networks:
  recorder-network:
    driver: bridge
